name: CICD

on:
  push:
    branches: [main]
  # This allows you to run the workflow manually
 # workflow_dispatch:
   path: '**.html'
   
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Check the list of file
      run: ls -a


      
  build:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: Build the code
        run: echo "Code has built"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test the code
        run: echo "Code has been tested"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy the build
        run: echo "Deploy the build"
